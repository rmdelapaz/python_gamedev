<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="ec-title ec-desc">
  <title id="ec-title">Easing function comparison strip — six curves at a glance</title>
  <desc id="ec-desc">Six small charts arranged in a 3-column by 2-row grid, each plotting one easing function as a curve with t (time, 0 to 1) on the horizontal axis and value (0 to 1) on the vertical axis. Each chart shows two faint horizontal reference lines marking value 0 and value 1, so any overshoot above 1 is immediately visible. Top row, left to right: linear (slate diagonal — constant rate, debug and tests); easeOutQuad (blue, fast-then-slow — responsive UI default); easeInOutCubic (teal S-curve — smooth at both ends, panel slides). Bottom row, left to right: easeOutBounce (amber, multiple decaying bumps — drops and landings); easeOutElastic (red, large overshoot above 1 then oscillates back — reveals and pickups); easeOutBack (indigo, small overshoot then settles — button release, snap-back). The footer notes that "Out" easings front-load motion (responsive feel), "In" easings build anticipation, and "InOut" combines both.</desc>

  <style>
    svg {
      --ec-text:           rgb(30, 41, 59);
      --ec-text-secondary: rgb(71, 85, 105);
      --ec-text-muted:     rgb(100, 116, 139);
      --ec-axis:           rgb(100, 116, 139);
      --ec-grid:           rgba(100, 116, 139, 0.22);
      --ec-card-bg:        rgb(248, 250, 252);
      --ec-card-stroke:    rgb(203, 213, 225);
      --ec-chart-bg:       rgb(255, 255, 255);
      --ec-linear:         rgb(100, 116, 139);
      --ec-quad:           rgb(59, 130, 246);
      --ec-cubic:          rgb(13, 148, 136);
      --ec-bounce:         rgb(217, 119, 6);
      --ec-elastic:        rgb(220, 38, 38);
      --ec-back:           rgb(124, 58, 237);
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --ec-text:           rgb(226, 232, 240);
        --ec-text-secondary: rgb(148, 163, 184);
        --ec-text-muted:     rgb(100, 116, 139);
        --ec-axis:           rgb(148, 163, 184);
        --ec-grid:           rgba(148, 163, 184, 0.22);
        --ec-card-bg:        rgb(31, 41, 55);
        --ec-card-stroke:    rgb(71, 85, 105);
        --ec-chart-bg:       rgb(15, 23, 42);
        --ec-linear:         rgb(148, 163, 184);
        --ec-quad:           rgb(86, 156, 214);
        --ec-cubic:          rgb(45, 212, 191);
        --ec-bounce:         rgb(251, 191, 36);
        --ec-elastic:        rgb(248, 113, 113);
        --ec-back:           rgb(167, 139, 250);
      }
    }
    .ec-title       { font: 700 14px ui-sans-serif, system-ui, sans-serif; fill: var(--ec-text); text-anchor: middle; }
    .ec-cell-name   { font: 700 12.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; text-anchor: middle; }
    .ec-cell-tick   { font: 500 9.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: var(--ec-text-muted); text-anchor: end; }
    .ec-cell-tick-x { font: 500 9.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: var(--ec-text-muted); text-anchor: middle; }
    .ec-cell-use    { font: italic 10.5px ui-sans-serif, system-ui, sans-serif; fill: var(--ec-text-secondary); text-anchor: middle; }
    .ec-foot-head   { font: 700 11.5px ui-sans-serif, system-ui, sans-serif; fill: var(--ec-text); text-anchor: middle; }
    .ec-foot-sub    { font: italic 10.5px ui-sans-serif, system-ui, sans-serif; fill: var(--ec-text-secondary); text-anchor: middle; }
  </style>

  <!-- Title -->
  <text x="360" y="22" class="ec-title">Easing functions — when each one shines</text>

  <!-- ============== TOP ROW ============== -->

  <!-- Cell 1: linear -->
  <g transform="translate(16, 38)">
    <rect x="0" y="0" width="220" height="168" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-linear)">linear</text>
    <!-- chart background -->
    <rect x="22" y="30" width="176" height="100" fill="var(--ec-chart-bg)" stroke="none"/>
    <!-- reference lines: v=0 at y=117.5, v=1 at y=55.0 -->
    <line x1="22" y1="117.5" x2="198" y2="117.5" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="55"    x2="198" y2="55"    stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="120.5" class="ec-cell-tick">0</text>
    <text x="20" y="58"    class="ec-cell-tick">1</text>
    <text x="22"  y="143" class="ec-cell-tick-x">t=0</text>
    <text x="198" y="143" class="ec-cell-tick-x">t=1</text>
    <!-- curve -->
    <line x1="22" y1="117.5" x2="198" y2="55" stroke="var(--ec-linear)" stroke-width="2.25" stroke-linecap="round"/>
    <text x="110" y="160" class="ec-cell-use">constant rate · debug, tests</text>
  </g>

  <!-- Cell 2: easeOutQuad -->
  <g transform="translate(248, 38)">
    <rect x="0" y="0" width="220" height="168" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-quad)">easeOutQuad</text>
    <rect x="22" y="30" width="176" height="100" fill="var(--ec-chart-bg)" stroke="none"/>
    <line x1="22" y1="117.5" x2="198" y2="117.5" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="55"    x2="198" y2="55"    stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="120.5" class="ec-cell-tick">0</text>
    <text x="20" y="58"    class="ec-cell-tick">1</text>
    <text x="22"  y="143" class="ec-cell-tick-x">t=0</text>
    <text x="198" y="143" class="ec-cell-tick-x">t=1</text>
    <polyline points="22.0,117.5 26.4,114.4 30.8,111.4 35.2,108.5 39.6,105.6 44.0,102.9 48.4,100.2 52.8,97.5 57.2,95.0 61.6,92.5 66.0,90.2 70.4,87.9 74.8,85.6 79.2,83.5 83.6,81.4 88.0,79.4 92.4,77.5 96.8,75.7 101.2,73.9 105.6,72.2 110.0,70.6 114.4,69.1 118.8,67.7 123.2,66.3 127.6,65.0 132.0,63.8 136.4,62.7 140.8,61.6 145.2,60.6 149.6,59.7 154.0,58.9 158.4,58.2 162.8,57.5 167.2,56.9 171.6,56.4 176.0,56.0 180.4,55.6 184.8,55.4 189.2,55.2 193.6,55.0 198.0,55.0"
              stroke="var(--ec-quad)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="110" y="160" class="ec-cell-use">fast then slow · responsive UI default</text>
  </g>

  <!-- Cell 3: easeInOutCubic -->
  <g transform="translate(480, 38)">
    <rect x="0" y="0" width="220" height="168" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-cubic)">easeInOutCubic</text>
    <rect x="22" y="30" width="176" height="100" fill="var(--ec-chart-bg)" stroke="none"/>
    <line x1="22" y1="117.5" x2="198" y2="117.5" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="55"    x2="198" y2="55"    stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="120.5" class="ec-cell-tick">0</text>
    <text x="20" y="58"    class="ec-cell-tick">1</text>
    <text x="22"  y="143" class="ec-cell-tick-x">t=0</text>
    <text x="198" y="143" class="ec-cell-tick-x">t=1</text>
    <polyline points="22.0,117.5 26.4,117.5 30.8,117.5 35.2,117.4 39.6,117.2 44.0,117.0 48.4,116.7 52.8,116.2 57.2,115.5 61.6,114.7 66.0,113.6 70.4,112.3 74.8,110.8 79.2,108.9 83.6,106.8 88.0,104.3 92.4,101.5 96.8,98.3 101.2,94.7 105.6,90.7 110.0,86.2 114.4,81.8 118.8,77.8 123.2,74.2 127.6,71.0 132.0,68.2 136.4,65.7 140.8,63.6 145.2,61.8 149.6,60.2 154.0,58.9 158.4,57.8 162.8,57.0 167.2,56.3 171.6,55.8 176.0,55.5 180.4,55.2 184.8,55.1 189.2,55.0 193.6,55.0 198.0,55.0"
              stroke="var(--ec-cubic)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="110" y="160" class="ec-cell-use">smooth both ends · panel slides</text>
  </g>

  <!-- ============== BOTTOM ROW ============== -->

  <!-- Cell 4: easeOutBounce -->
  <g transform="translate(16, 214)">
    <rect x="0" y="0" width="220" height="120" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-bounce)">easeOutBounce</text>
    <rect x="22" y="30" width="176" height="64" fill="var(--ec-chart-bg)" stroke="none"/>
    <!-- Bottom row uses compressed chart height: chart y=30..94, v=0 at y=86, v=1 at y=46 -->
    <line x1="22" y1="86" x2="198" y2="86" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="46" x2="198" y2="46" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="89" class="ec-cell-tick">0</text>
    <text x="20" y="49" class="ec-cell-tick">1</text>
    <polyline points="22.0,86.0 26.4,85.8 30.8,85.2 35.2,84.3 39.6,83.0 44.0,81.3 48.4,79.2 52.8,76.7 57.2,73.9 61.6,70.7 66.0,67.1 70.4,63.1 74.8,58.8 79.2,54.0 83.6,48.9 88.0,47.2 92.4,49.6 96.8,51.6 101.2,53.2 105.6,54.5 110.0,55.4 114.4,55.9 118.8,56.0 123.2,55.7 127.6,55.1 132.0,54.1 136.4,52.7 140.8,50.9 145.2,48.8 149.6,46.2 154.0,47.1 158.4,47.9 162.8,48.4 167.2,48.5 171.6,48.2 176.0,47.5 180.4,46.5 184.8,46.4 189.2,46.6 193.6,46.5 198.0,46.0"
              stroke="var(--ec-bounce)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="110" y="112" class="ec-cell-use">bounces to settle · drops, landings</text>
  </g>

  <!-- Cell 5: easeOutElastic -->
  <g transform="translate(248, 214)">
    <rect x="0" y="0" width="220" height="120" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-elastic)">easeOutElastic</text>
    <rect x="22" y="30" width="176" height="64" fill="var(--ec-chart-bg)" stroke="none"/>
    <line x1="22" y1="86" x2="198" y2="86" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="46" x2="198" y2="46" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="89" class="ec-cell-tick">0</text>
    <text x="20" y="49" class="ec-cell-tick">1</text>
    <!-- elastic curve: peak v=1.274 at t=0.17 → y=35, well above v=1 reference line at y=46 -->
    <polyline points="22.0,86.0 26.4,77.1 30.8,66.0 35.2,55.1 39.6,46.0 44.0,39.6 48.4,36.0 52.8,35.0 57.2,36.0 61.6,38.2 66.0,41.0 70.4,43.7 74.8,46.0 79.2,47.6 83.6,48.5 88.0,48.7 92.4,48.5 96.8,47.9 101.2,47.3 105.6,46.6 110.0,46.0 114.4,45.6 118.8,45.4 123.2,45.3 127.6,45.4 132.0,45.5 136.4,45.7 140.8,45.9 145.2,46.0 149.6,46.1 154.0,46.2 158.4,46.2 162.8,46.2 167.2,46.1 171.6,46.1 176.0,46.0 180.4,46.0 184.8,46.0 189.2,46.0 193.6,46.0 198.0,46.0"
              stroke="var(--ec-elastic)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="110" y="112" class="ec-cell-use">overshoots, oscillates · reveals, pickups</text>
  </g>

  <!-- Cell 6: easeOutBack -->
  <g transform="translate(480, 214)">
    <rect x="0" y="0" width="220" height="120" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
    <text x="110" y="18" class="ec-cell-name" fill="var(--ec-back)">easeOutBack</text>
    <rect x="22" y="30" width="176" height="64" fill="var(--ec-chart-bg)" stroke="none"/>
    <line x1="22" y1="86" x2="198" y2="86" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="22" y1="46" x2="198" y2="46" stroke="var(--ec-grid)" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="20" y="89" class="ec-cell-tick">0</text>
    <text x="20" y="49" class="ec-cell-tick">1</text>
    <!-- back curve: small overshoot to ~v=1.10 → minimum y=42 around t=0.55 -->
    <polyline points="22.0,86.0 26.4,81.5 30.8,77.2 35.2,73.3 39.6,69.6 44.0,66.3 48.4,63.2 52.8,60.4 57.2,57.8 61.6,55.4 66.0,53.3 70.4,51.4 74.8,49.7 79.2,48.2 83.6,46.9 88.0,45.8 92.4,44.8 96.8,44.0 101.2,43.4 105.6,42.9 110.0,42.5 114.4,42.2 118.8,42.1 123.2,42.0 127.6,42.0 132.0,42.1 136.4,42.3 140.8,42.5 145.2,42.8 149.6,43.1 154.0,43.4 158.4,43.8 162.8,44.1 167.2,44.5 171.6,44.8 176.0,45.1 180.4,45.4 184.8,45.7 189.2,45.8 193.6,46.0 198.0,46.0"
              stroke="var(--ec-back)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="110" y="112" class="ec-cell-use">small overshoot · button release, snap</text>
  </g>

  <!-- ============== BOTTOM STRIP ============== -->
  <rect x="40" y="346" width="640" height="44" rx="6" fill="var(--ec-card-bg)" stroke="var(--ec-card-stroke)" stroke-width="1"/>
  <text x="360" y="365" class="ec-foot-head"><tspan font-weight="700">Out</tspan> = front-loaded (responsive)  ·  <tspan font-weight="700">In</tspan> = builds anticipation  ·  <tspan font-weight="700">InOut</tspan> = both</text>
  <text x="360" y="381" class="ec-foot-sub">Watch the dashed v=1 line — elastic and back overshoot it; bounce decays back to it in stages</text>
</svg>
