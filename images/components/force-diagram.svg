<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="force-title force-desc">
    <title id="force-title">Free-body diagram: gravity, normal force, applied force, and friction</title>
    <desc id="force-desc">A rectangular block sits on horizontal hatched ground. A small arrow above the block labelled "motion" points to the right. Four equal-length force arrows emanate from the block's centre: gravity (F sub g) points down, normal force (F sub n) points up, applied force (F sub a) points right, and friction (F sub f) points left, opposing motion.</desc>

    <style>
        svg {
            --ground:       rgb(71, 85, 105);
            --ground-hatch: #94a3b8;
            --block-fill:   rgba(59, 130, 246, 0.08);
            --block-stroke: rgb(59, 130, 246);
            --motion:       rgb(100, 116, 139);
            --gravity:      rgb(220, 38, 38);
            --normal:       rgb(13, 148, 136);
            --applied:      rgb(59, 130, 246);
            --friction:     rgb(217, 119, 6);
        }
        @media (prefers-color-scheme: dark) {
            svg {
                --ground:       #cbd5e1;
                --ground-hatch: #94a3b8;
                --block-fill:   rgba(86, 156, 214, 0.18);
                --block-stroke: rgb(86, 156, 214);
                --motion:       #94a3b8;
                --gravity:      rgb(248, 113, 113);
                --normal:       rgb(45, 212, 191);
                --applied:      rgb(86, 156, 214);
                --friction:     rgb(251, 191, 36);
            }
        }
        .ground-line  { stroke: var(--ground);       stroke-width: 2;   fill: none; }
        .ground-hatch { stroke: var(--ground-hatch); stroke-width: 1;   fill: none; }
        .block        { fill: var(--block-fill);     stroke: var(--block-stroke); stroke-width: 2; }
        .motion-line  { stroke: var(--motion);       stroke-width: 1.5; fill: none; }
        .motion-label { fill: var(--motion);   font: italic 500 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
        .force-line   { stroke-width: 3.5; fill: none; stroke-linecap: round; }
        .force-label  { font: 700 20px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
        .force-sub    { font-size: 14px; }

        .gravity-line  { stroke: var(--gravity);  }
        .normal-line   { stroke: var(--normal);   }
        .applied-line  { stroke: var(--applied);  }
        .friction-line { stroke: var(--friction); }
        .gravity-text  { fill:   var(--gravity);  }
        .normal-text   { fill:   var(--normal);   }
        .applied-text  { fill:   var(--applied);  }
        .friction-text { fill:   var(--friction); }
    </style>

    <defs>
        <marker id="head-gravity"  viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="var(--gravity)"/>
        </marker>
        <marker id="head-normal"   viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="var(--normal)"/>
        </marker>
        <marker id="head-applied"  viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="var(--applied)"/>
        </marker>
        <marker id="head-friction" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="var(--friction)"/>
        </marker>
        <marker id="head-motion"   viewBox="0 0 10 10" refX="9"  refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="var(--motion)"/>
        </marker>
    </defs>

    <!-- Ground line + hatching -->
    <line class="ground-line" x1="40" y1="320" x2="660" y2="320"/>
    <g class="ground-hatch">
        <line x1="55"  y1="320" x2="40"  y2="340"/>
        <line x1="85"  y1="320" x2="70"  y2="340"/>
        <line x1="115" y1="320" x2="100" y2="340"/>
        <line x1="145" y1="320" x2="130" y2="340"/>
        <line x1="175" y1="320" x2="160" y2="340"/>
        <line x1="205" y1="320" x2="190" y2="340"/>
        <line x1="235" y1="320" x2="220" y2="340"/>
        <line x1="265" y1="320" x2="250" y2="340"/>
        <line x1="295" y1="320" x2="280" y2="340"/>
        <line x1="325" y1="320" x2="310" y2="340"/>
        <line x1="355" y1="320" x2="340" y2="340"/>
        <line x1="385" y1="320" x2="370" y2="340"/>
        <line x1="415" y1="320" x2="400" y2="340"/>
        <line x1="445" y1="320" x2="430" y2="340"/>
        <line x1="475" y1="320" x2="460" y2="340"/>
        <line x1="505" y1="320" x2="490" y2="340"/>
        <line x1="535" y1="320" x2="520" y2="340"/>
        <line x1="565" y1="320" x2="550" y2="340"/>
        <line x1="595" y1="320" x2="580" y2="340"/>
        <line x1="625" y1="320" x2="610" y2="340"/>
        <line x1="655" y1="320" x2="640" y2="340"/>
    </g>

    <!-- Direction-of-motion indicator (centered on x=350, above Fn arrowhead at y=160) -->
    <line class="motion-line" x1="295" y1="120" x2="405" y2="120" marker-end="url(#head-motion)"/>
    <text class="motion-label" x="350" y="105" text-anchor="middle">motion</text>

    <!-- Block on ground -->
    <rect class="block" x="285" y="220" width="130" height="100" rx="6"/>

    <!-- Force vectors (all from block COM at 350, 270, equal length 110 = equilibrium) -->
    <!-- Gravity: down -->
    <line class="force-line gravity-line"  x1="350" y1="270" x2="350" y2="380" marker-end="url(#head-gravity)"/>
    <text class="force-label gravity-text" x="365" y="376">F<tspan class="force-sub" dy="6">g</tspan></text>

    <!-- Normal: up -->
    <line class="force-line normal-line"   x1="350" y1="270" x2="350" y2="160" marker-end="url(#head-normal)"/>
    <text class="force-label normal-text"  x="365" y="170">F<tspan class="force-sub" dy="6">n</tspan></text>

    <!-- Applied: right -->
    <line class="force-line applied-line"  x1="350" y1="270" x2="460" y2="270" marker-end="url(#head-applied)"/>
    <text class="force-label applied-text" x="475" y="276">F<tspan class="force-sub" dy="6">a</tspan></text>

    <!-- Friction: left (opposes motion) -->
    <line class="force-line friction-line" x1="350" y1="270" x2="240" y2="270" marker-end="url(#head-friction)"/>
    <text class="force-label friction-text" x="225" y="276" text-anchor="end">F<tspan class="force-sub" dy="6">f</tspan></text>
</svg>
