<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="glc-title glc-desc">
  <title id="glc-title">The game loop's three-phase cycle: input, update, render</title>
  <desc id="glc-desc">Three rounded rectangles arranged in a triangle, connected by clockwise curved arrows that form a cycle. Top: Input (poll events, read keys and mouse, queue input). Bottom right: Update (advance physics, run AI and check collisions, step by dt). Bottom left: Render (clear screen, draw entities, flip and present). The center reads "one frame" to anchor the cycle as a single iteration. Below the cycle, a horizontal stacked bar shows the 16.67 millisecond frame budget at 60 FPS, divided into illustrative input, update, and render proportions, with a note that clock.tick(60) enforces this budget.</desc>

  <style>
    svg {
      --glc-text:           rgb(30, 41, 59);
      --glc-text-secondary: rgb(71, 85, 105);
      --glc-text-muted:     rgb(100, 116, 139);
      --glc-arrow:          rgb(100, 116, 139);
      --glc-card-bg:        rgb(248, 250, 252);
      --glc-card-stroke:    rgb(203, 213, 225);
      --glc-strip-bg:       rgb(248, 250, 252);
      --glc-input-header:   rgb(37, 99, 235);
      --glc-update-header:  rgb(15, 118, 110);
      --glc-render-header:  rgb(180, 83, 9);
      --glc-input-fill:     rgb(219, 234, 254);
      --glc-update-fill:    rgb(204, 251, 241);
      --glc-render-fill:    rgb(254, 243, 199);
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --glc-text:           rgb(226, 232, 240);
        --glc-text-secondary: rgb(148, 163, 184);
        --glc-text-muted:     rgb(100, 116, 139);
        --glc-arrow:          rgb(148, 163, 184);
        --glc-card-bg:        rgb(31, 41, 55);
        --glc-card-stroke:    rgb(71, 85, 105);
        --glc-strip-bg:       rgb(31, 41, 55);
        /* header colors stay theme-stable for white-text WCAG contrast */
        --glc-input-fill:     rgba(59, 130, 246, 0.18);
        --glc-update-fill:    rgba(45, 212, 191, 0.18);
        --glc-render-fill:    rgba(251, 191, 36, 0.18);
      }
    }
    .glc-node-title    { font: 700 17px ui-sans-serif, system-ui, sans-serif; fill: white; text-anchor: middle; }
    .glc-node-bullet   { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text); text-anchor: middle; }
    .glc-node-mono     { font: 600 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .glc-center        { font: italic 700 13px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text-secondary); text-anchor: middle; }
    .glc-center-glyph  { font: 400 18px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text-muted); text-anchor: middle; }
    .glc-strip-label   { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text-secondary); }
    .glc-strip-bold    { font: 700 12px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text); }
    .glc-strip-ms      { font: 700 12.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: var(--glc-text); }
    .glc-strip-seg     { font: 600 10.5px ui-sans-serif, system-ui, sans-serif; fill: white; text-anchor: middle; }
    .glc-strip-note    { font: italic 10.5px ui-sans-serif, system-ui, sans-serif; fill: var(--glc-text-muted); }
    .glc-strip-mono    { font: 500 10.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: var(--glc-text-muted); }
  </style>

  <defs>
    <!-- Single arrow marker — slate, used by all three cycle arcs -->
    <marker id="glc-arrow-head" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--glc-arrow)"/>
    </marker>
  </defs>

  <!-- ============== Cycle arrows (drawn first so node rects sit on top) ============== -->
  <!-- Each arc lives on a circle of radius 150 centered at (360, 210). Endpoints
       sit ~10 px outside their target rect so each arrowhead has a visible margin
       to the node it points into. -->
  <g fill="none" stroke="var(--glc-arrow)" stroke-width="3" stroke-linecap="round">
    <!-- Input → Update : 60° → 0° clockwise; head 10 px above Update top -->
    <path d="M 435 80 A 150 150 0 0 1 510 210" marker-end="url(#glc-arrow-head)"/>
    <!-- Update → Render : 300° → ~249° clockwise; head 10 px below Render bottom -->
    <path d="M 435 340 A 150 150 0 0 1 306 350" marker-end="url(#glc-arrow-head)"/>
    <!-- Render → Input : 180° → ~127° clockwise; head 10 px left of Input left -->
    <path d="M 210 210 A 150 150 0 0 1 270 90"  marker-end="url(#glc-arrow-head)"/>
  </g>

  <!-- ============== Center label "one frame" ============== -->
  <g>
    <text x="360" y="206" class="glc-center">one frame</text>
    <text x="360" y="226" class="glc-center-glyph">↻</text>
  </g>

  <!-- ============== Phase nodes ============== -->

  <!-- Input (top center, x=280..440, y=20..140) — blue header -->
  <g>
    <rect x="280" y="20" width="160" height="120" rx="8"
          fill="var(--glc-input-fill)" stroke="var(--glc-card-stroke)" stroke-width="1.5"/>
    <!-- top-only-rounded header band (matches save-tree / component-diagram pattern) -->
    <path d="M 280 28 Q 280 20 288 20 L 432 20 Q 440 20 440 28 L 440 50 L 280 50 Z"
          fill="var(--glc-input-header)"/>
    <text x="360" y="40" class="glc-node-title">Input</text>
    <text x="360" y="74" class="glc-node-bullet">poll events</text>
    <text x="360" y="94" class="glc-node-bullet">read keys / mouse</text>
    <text x="360" y="114" class="glc-node-bullet">queue input</text>
  </g>

  <!-- Update (bottom right, x=410..570, y=220..340) — teal header -->
  <g>
    <rect x="410" y="220" width="160" height="120" rx="8"
          fill="var(--glc-update-fill)" stroke="var(--glc-card-stroke)" stroke-width="1.5"/>
    <path d="M 410 228 Q 410 220 418 220 L 562 220 Q 570 220 570 228 L 570 250 L 410 250 Z"
          fill="var(--glc-update-header)"/>
    <text x="490" y="240" class="glc-node-title">Update</text>
    <text x="490" y="274" class="glc-node-bullet">advance physics</text>
    <text x="490" y="294" class="glc-node-bullet">run AI · check collisions</text>
    <text x="490" y="314" class="glc-node-bullet">step by <tspan class="glc-node-mono" font-style="italic">dt</tspan></text>
  </g>

  <!-- Render (bottom left, x=150..310, y=220..340) — amber header -->
  <g>
    <rect x="150" y="220" width="160" height="120" rx="8"
          fill="var(--glc-render-fill)" stroke="var(--glc-card-stroke)" stroke-width="1.5"/>
    <path d="M 150 228 Q 150 220 158 220 L 302 220 Q 310 220 310 228 L 310 250 L 150 250 Z"
          fill="var(--glc-render-header)"/>
    <text x="230" y="240" class="glc-node-title">Render</text>
    <text x="230" y="274" class="glc-node-bullet">clear screen</text>
    <text x="230" y="294" class="glc-node-bullet">draw entities</text>
    <text x="230" y="314" class="glc-node-bullet">flip / present</text>
  </g>

  <!-- ============== Frame-budget strip (bottom) ============== -->
  <g>
    <rect x="40" y="365" width="640" height="50" rx="6"
          fill="var(--glc-strip-bg)" stroke="var(--glc-card-stroke)" stroke-width="1.5"/>

    <!-- Left-side label -->
    <text x="56" y="384" class="glc-strip-label">One frame at <tspan class="glc-strip-bold">60 FPS</tspan></text>
    <text x="56" y="400" class="glc-strip-ms">16.67 ms <tspan class="glc-strip-mono">= 1000/60</tspan></text>

    <!-- Stacked frame-budget bar (illustrative widths only) -->
    <!-- Bar spans x=240..600 (360 wide). Splits: input ~10%, update ~50%, render ~40%. -->
    <g>
      <!-- input segment -->
      <rect x="240" y="378" width="36" height="18" fill="var(--glc-input-header)"/>
      <text x="258" y="391" class="glc-strip-seg">in</text>
      <!-- update segment -->
      <rect x="276" y="378" width="180" height="18" fill="var(--glc-update-header)"/>
      <text x="366" y="391" class="glc-strip-seg">update</text>
      <!-- render segment -->
      <rect x="456" y="378" width="144" height="18" fill="var(--glc-render-header)"/>
      <text x="528" y="391" class="glc-strip-seg">render</text>

      <!-- end tick + ms anchor -->
      <line x1="600" y1="376" x2="600" y2="402" stroke="var(--glc-text-muted)" stroke-width="1.5"/>
      <text x="608" y="391" class="glc-strip-ms">16.67 ms</text>
    </g>

    <!-- Sub-line note -->
    <text x="240" y="408" class="glc-strip-note"><tspan class="glc-strip-mono">clock.tick(60)</tspan> enforces this budget · segment widths illustrative</text>
  </g>

</svg>
