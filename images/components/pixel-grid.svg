<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="px-title px-desc">
    <title id="px-title">An 8 by 8 pixel grid showing a sprite as discrete coloured cells</title>
    <desc id="px-desc">An eight-by-eight grid of square cells with column numbers 0 through 7 along the top and row numbers 0 through 7 along the left side. Some cells are filled in coral-red to form a small pixel-art heart shape, and the remaining cells are empty to represent transparent pixels. A leader line points from the cell at column 5, row 1 to a label reading "pixel (5, 1)", illustrating how an image is addressed as a 2D grid of pixels with the origin (0, 0) at the top-left.</desc>

    <style>
        svg {
            --grid-line:   rgb(148, 163, 184);
            --empty-fill:  rgba(148, 163, 184, 0.10);
            --filled:      rgb(220, 38, 38);
            --axis-label:  rgb(71, 85, 105);
            --callout:     rgb(180, 83, 9);
        }
        @media (prefers-color-scheme: dark) {
            svg {
                --grid-line:   rgb(100, 116, 139);
                --empty-fill:  rgba(148, 163, 184, 0.14);
                --filled:      rgb(248, 113, 113);
                --axis-label:  rgb(203, 213, 225);
                --callout:     rgb(251, 191, 36);
            }
        }
        .grid-bg      { fill: var(--empty-fill);  stroke: none; }
        .filled-cell  { fill: var(--filled);      stroke: none; }
        .grid-line    { stroke: var(--grid-line); stroke-width: 1; fill: none; }
        .axis-label   { fill: var(--axis-label);  font: 600 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
        .callout-line { stroke: var(--callout);   stroke-width: 1.5; fill: none; }
        .callout-text { fill: var(--callout);     font: italic 600 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    </style>

    <!-- ==== Column labels (0..7) above the grid ==== -->
    <g class="axis-label">
        <text x="76"  y="28" text-anchor="middle">0</text>
        <text x="108" y="28" text-anchor="middle">1</text>
        <text x="140" y="28" text-anchor="middle">2</text>
        <text x="172" y="28" text-anchor="middle">3</text>
        <text x="204" y="28" text-anchor="middle">4</text>
        <text x="236" y="28" text-anchor="middle">5</text>
        <text x="268" y="28" text-anchor="middle">6</text>
        <text x="300" y="28" text-anchor="middle">7</text>
    </g>

    <!-- ==== Row labels (0..7) left of the grid ==== -->
    <g class="axis-label">
        <text x="48" y="56"  text-anchor="end" dominant-baseline="central">0</text>
        <text x="48" y="88"  text-anchor="end" dominant-baseline="central">1</text>
        <text x="48" y="120" text-anchor="end" dominant-baseline="central">2</text>
        <text x="48" y="152" text-anchor="end" dominant-baseline="central">3</text>
        <text x="48" y="184" text-anchor="end" dominant-baseline="central">4</text>
        <text x="48" y="216" text-anchor="end" dominant-baseline="central">5</text>
        <text x="48" y="248" text-anchor="end" dominant-baseline="central">6</text>
        <text x="48" y="280" text-anchor="end" dominant-baseline="central">7</text>
    </g>

    <!-- ==== Grid background (subtle empty-cell tint) ==== -->
    <rect class="grid-bg" x="60" y="40" width="256" height="256"/>

    <!-- ==== Filled cells forming an 8x8 pixel heart (batched by row for compactness) ==== -->
    <!-- Row 1: cols 1-2 and 5-6 -->
    <rect class="filled-cell" x="92"  y="72"  width="64"  height="32"/>
    <rect class="filled-cell" x="220" y="72"  width="64"  height="32"/>
    <!-- Row 2: cols 0-7 -->
    <rect class="filled-cell" x="60"  y="104" width="256" height="32"/>
    <!-- Row 3: cols 0-7 -->
    <rect class="filled-cell" x="60"  y="136" width="256" height="32"/>
    <!-- Row 4: cols 1-6 -->
    <rect class="filled-cell" x="92"  y="168" width="192" height="32"/>
    <!-- Row 5: cols 2-5 -->
    <rect class="filled-cell" x="124" y="200" width="128" height="32"/>
    <!-- Row 6: cols 3-4 -->
    <rect class="filled-cell" x="156" y="232" width="64"  height="32"/>

    <!-- ==== Grid lines (drawn on top of cells) ==== -->
    <g class="grid-line">
        <!-- 9 vertical lines from y=40 to y=296 -->
        <line x1="60"  y1="40" x2="60"  y2="296"/>
        <line x1="92"  y1="40" x2="92"  y2="296"/>
        <line x1="124" y1="40" x2="124" y2="296"/>
        <line x1="156" y1="40" x2="156" y2="296"/>
        <line x1="188" y1="40" x2="188" y2="296"/>
        <line x1="220" y1="40" x2="220" y2="296"/>
        <line x1="252" y1="40" x2="252" y2="296"/>
        <line x1="284" y1="40" x2="284" y2="296"/>
        <line x1="316" y1="40" x2="316" y2="296"/>
        <!-- 9 horizontal lines from x=60 to x=316 -->
        <line x1="60" y1="40"  x2="316" y2="40"/>
        <line x1="60" y1="72"  x2="316" y2="72"/>
        <line x1="60" y1="104" x2="316" y2="104"/>
        <line x1="60" y1="136" x2="316" y2="136"/>
        <line x1="60" y1="168" x2="316" y2="168"/>
        <line x1="60" y1="200" x2="316" y2="200"/>
        <line x1="60" y1="232" x2="316" y2="232"/>
        <line x1="60" y1="264" x2="316" y2="264"/>
        <line x1="60" y1="296" x2="316" y2="296"/>
    </g>

    <!-- ==== Callout: leader line + label pointing at cell (5, 1) ==== -->
    <line class="callout-line" x1="252" y1="88" x2="345" y2="88"/>
    <text class="callout-text" x="352" y="88" text-anchor="start" dominant-baseline="central">pixel (5, 1)</text>
</svg>
