  <!-- Flying enemy callout (5th lesson type, not on the path) -->
  <text x="554" y="354" text-anchor="start" font-size="8" font-weight="700" class="tdl-text">+ Flying ✈️</text>
  <text x="554" y="364" text-anchor="start" font-size="7.5" class="tdl-text-sub">Late waves only · only Laser hits.</text>

  <!-- Boss callout (6th type, not on the path) -->
  <text x="554" y="382" text-anchor="start" font-size="8" font-weight="700" class="tdl-text">+ Boss</text>
  <text x="554" y="392" text-anchor="start" font-size="7.5" class="tdl-text-sub">hp 1000 · wave 10+</text>

  <!-- Footer caption (centered across full SVG width) -->
  <text x="280" y="426" text-anchor="middle" font-size="8" font-style="italic" class="tdl-text-sub">Range overlap and enemy mix drive tower placement choices.</text>
</svg>
